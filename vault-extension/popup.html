<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <title>Vault Resell</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 13px;
    }

    header {
      background: #4f46e5;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.2px;
    }
    header span { font-size: 20px; }

    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: #1e293b;
      border-bottom: 1px solid #1e293b;
    }
    .stat-card {
      background: #0f172a;
      padding: 14px 16px;
    }
    .stat-label {
      font-size: 11px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #f8fafc;
    }
    .stat-value.green { color: #4ade80; }

    .section-header {
      padding: 12px 16px 6px;
      font-size: 11px;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .order-list {
      max-height: 240px;
      overflow-y: auto;
    }
    .order-list::-webkit-scrollbar { width: 4px; }
    .order-list::-webkit-scrollbar-track { background: transparent; }
    .order-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    .order-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 16px;
      border-bottom: 1px solid #1e293b;
    }
    .order-item:last-child { border-bottom: none; }

    .order-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4f46e5;
      flex-shrink: 0;
    }

    .order-info { flex: 1; min-width: 0; }
    .order-title {
      font-weight: 500;
      color: #f1f5f9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .order-meta {
      font-size: 11px;
      color: #64748b;
      margin-top: 1px;
    }

    .order-price {
      font-weight: 700;
      color: #4ade80;
      flex-shrink: 0;
    }

    .empty-state {
      padding: 28px 16px;
      text-align: center;
      color: #475569;
    }
    .empty-state p { margin-top: 6px; font-size: 12px; line-height: 1.5; }

    footer {
      padding: 10px 16px;
      border-top: 1px solid #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    footer a {
      font-size: 11px;
      color: #4f46e5;
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }
    .clear-btn {
      font-size: 11px;
      color: #64748b;
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .clear-btn:hover { background: #1e293b; color: #f87171; }
  </style>
</head>
<body>
  <header>
    <span>🏠</span>
    <h1>Vault Resell Sync</h1>
  </header>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Vandaag verkopen</div>
      <div class="stat-value" id="today-count">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Vandaag omzet</div>
      <div class="stat-value green" id="today-revenue">—</div>
    </div>
  </div>

  <div class="section-header">Recente bestellingen</div>

  <div class="order-list" id="order-list">
    <div class="empty-state">
      <div>📦</div>
      <p>Nog geen bestellingen gesynchroniseerd.<br>Ga naar Vinted &gt; Mijn verkopen.</p>
    </div>
  </div>

  <footer>
    <a href="https://www.vinted.be/my/sales" target="_blank">Vinted openen</a>
    <button class="clear-btn" id="clear-btn">Wis alles</button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
